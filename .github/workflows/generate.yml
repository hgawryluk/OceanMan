name: Generate JSON Data

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:        # manual trigger from GitHub UI

permissions:
  contents: write           # required to commit generated JSON back to repo

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parsers and generate JSON
        run: python generate.py --refresh

      - name: Commit generated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet && echo "No changes to commit." || \
            git commit -m "chore: update pool data [skip ci]" && git push
